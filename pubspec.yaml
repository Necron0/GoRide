name: gojek
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── PETA ─────────────────────────────────────────────
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ── FIREBASE ─────────────────────────────────────────
  firebase_core: ^3.0.0
  firebase_database: ^11.0.0   # Realtime Database (GPS sharing)
  firebase_auth: ^5.0.0        # Auth (bedain driver vs pelanggan)

  # ── GPS DEVICE ───────────────────────────────────────
  geolocator: ^13.0.0          # Ambil GPS dari HP driver

  # ── HTTP (OpenRouteService API) ───────────────────────
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true